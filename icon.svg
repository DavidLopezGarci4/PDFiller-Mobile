<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#090d16" />
    </linearGradient>
    <!-- Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Outer Ring Glow -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#brand-grad)" stroke-width="4" opacity="0.2" />

  <!-- Brand Elements -->
  <g transform="translate(116, 96)" filter="url(#glow)">
    <!-- Document Icon Outline -->
    <path d="M40 0 H180 L240 60 V280 C240 297.7 225.7 312 208 312 H40 C22.3 312 8 297.7 8 280 V32 C8 14.3 22.3 0 40 0 Z" fill="none" stroke="url(#brand-grad)" stroke-width="16" stroke-linejoin="round" />
    
    <!-- Folded Corner -->
    <path d="M180 0 V60 H240 Z" fill="url(#brand-grad)" />

    <!-- Pen / Signature Icon -->
    <path d="M30 200 L160 70 C168.3 61.7 181.7 61.7 190 70 L210 90 C218.3 98.3 218.3 111.7 210 120 L80 250 L30 260 Z" fill="url(#brand-grad)" />
    
    <!-- Signature Line Swash -->
    <path d="M40 230 C80 250, 160 210, 220 240" fill="none" stroke="#a78bfa" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
